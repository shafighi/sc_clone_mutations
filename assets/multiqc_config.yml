# MultiQC configuration for sc_clone_mutations
# https://multiqc.info/docs/getting_started/config/

title: "sc_clone_mutations QC Report"
subtitle: "Clone-aware somatic mutation analysis from scDNA-seq"
intro_text: "Quality control metrics for pseudobulk BAMs and variant calling."

report_comment: >
  Generated by sc_clone_mutations pipeline.
  Each sample in this report corresponds to one clone pseudobulk BAM.

# Only include modules relevant to this pipeline
module_order:
  - samtools
  - picard
  - mosdepth
  - bcftools
  - general_stats

# Custom columns shown on the General Statistics table
custom_data:
  clone_qc:
    section_name: "Clone Pseudobulk QC"
    description: "Per-clone BAM quality metrics"

# Remove unwanted sections
remove_sections:
  - fastqc
  - trimmomatic
  - fastp
  - star

table_columns_visible:
  samtools_flagstat:
    "mapped_passed": True
    "duplicates_passed": True
    "properly_paired_passed": False   # not relevant for scDNA-seq
  picard_mark_duplicates:
    PERCENT_DUPLICATION: True
    ESTIMATED_LIBRARY_SIZE: True
  mosdepth:
    median_coverage: True
    mean_coverage: True
    1_x_pc: False
    5_x_pc: True
    10_x_pc: True
    30_x_pc: True

# Colour palette for clone samples
sample_names_rename_buttons:
  - "Replace 'clone_' with 'Clone '"

plots_force_interactive: false
export_plots: true
make_data_dir: true
